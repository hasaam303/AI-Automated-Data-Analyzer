version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ai-analyst-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai-analyst-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
