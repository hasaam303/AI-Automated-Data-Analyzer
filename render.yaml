services:
  - type: web
    name: ai-data-analyst-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGINS
        sync: false          # set to ["https://your-app.vercel.app"]
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: DEBUG
        value: "false"
